name: Build Dart FFI Library

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ext: dylib
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p html-to-markdown-ffi
      - name: Rename for upload
        run: |
          cp target/release/libhtml_to_markdown_ffi.${{ matrix.ext }} \
            libhtml_to_markdown_ffi-${{ matrix.target }}.${{ matrix.ext }}
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            libhtml_to_markdown_ffi-${{ matrix.target }}.${{ matrix.ext }} \
            --repo arrrrny/html-to-markdown --clobber
